name: Paper benchmark (manual)

# Heavy, manually-dispatched benchmark in AntHocNet's *intended* regime (the
# paper's large/sparse/mobile scenario, 300 m range), with --diag so we can see
# whether routes actually form. Not part of per-merge CI: the paper scenario is
# expensive, and the dense-small smoke in ci.yml is the fast regression gate.
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'ns-3 image tag'
        default: '3.42'
      nNodes:
        description: 'Number of nodes'
        default: '50'
      time:
        description: 'Sim time (s) — 900 is the full paper run; lower for speed'
        default: '300'
      runs:
        description: 'RNG runs to average'
        default: '3'
      areaX:
        description: 'Area long edge (m) — paper sweeps 1500..2500'
        default: '1500'
      areaY:
        description: 'Area short edge (m) — leave blank for the preset (300). Set small (e.g. 50) with a small areaX for a guaranteed in-range sanity anchor (#24).'
        default: ''
      pause:
        description: 'Random-waypoint pause time (s) — paper sweeps 0..900'
        default: '30'
      speed:
        description: 'Max node speed (m/s); set low (e.g. 1) with pause=900 for a near-static anchor'
        default: '20'
      protocols:
        description: 'Comma-separated protocol list'
        default: 'anthocnet,aodv,olsr,dsdv'
      propagation:
        description: 'Propagation model: range (disk) | tworay (#24)'
        default: 'range'
      range:
        description: 'Transmission range (m) for the disk model (#24 disentangler)'
        default: '300'
      harness:
        description: 'Binary: compare (AntHocNet vs baselines) | baselines (stock ns-3 only, #24 control)'
        default: 'compare'
      extraArgs:
        description: 'Extra args appended verbatim (e.g. --ns3::anthocnet::RoutingProtocol::EnableMacFailureDetector=false for the #46 detector sweep)'
        default: ''

permissions:
  contents: read
  packages: read

jobs:
  paper:
    name: paper scenario + diagnostics
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository_owner }}/ns3:${{ github.event.inputs.version }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Install AntHocNet module
        run: make install-ns3 NS3DIR=/opt/ns-3
      - name: Configure
        run: |
          cd /opt/ns-3
          ./ns3 configure --enable-examples \
            --enable-modules='anthocnet;wifi;mobility;applications;csma;aodv;olsr;dsdv;flow-monitor;point-to-point'
      - name: Build
        run: cd /opt/ns-3 && ./ns3 build
      - name: Run paper scenario
        # Container jobs default to plain `sh`, where `set -o pipefail` is an
        # illegal option (run 29664072922 died instantly on it). The image is
        # Ubuntu, so bash is present — declare it explicitly.
        shell: bash
        run: |
          cd /opt/ns-3
          common="--scenario=paper \
            --runs=${{ github.event.inputs.runs }} \
            --nNodes=${{ github.event.inputs.nNodes }} \
            --time=${{ github.event.inputs.time }} \
            --areaX=${{ github.event.inputs.areaX }} \
            --pause=${{ github.event.inputs.pause }} \
            --speed=${{ github.event.inputs.speed }} \
            --propagation=${{ github.event.inputs.propagation }} \
            --range=${{ github.event.inputs.range }}"
          if [ -n "${{ github.event.inputs.areaY }}" ]; then
            common="$common --areaY=${{ github.event.inputs.areaY }}"
          fi
          if [ -n "${{ github.event.inputs.extraArgs }}" ]; then
            # e.g. ns-3 attribute overrides for the #46 detector-D sweep.
            common="$common ${{ github.event.inputs.extraArgs }}"
          fi
          if [ "${{ github.event.inputs.harness }}" = "baselines" ]; then
            # #24 control: stock ns-3 baselines only, no AntHocNet in the binary.
            cmd="manet-baselines $common --protocols=aodv,olsr,dsdv"
          else
            cmd="anthocnet-compare $common --diag --protocols=${{ github.event.inputs.protocols }}"
          fi
          echo "$cmd"
          # #28 hardening: stderr used to be discarded wholesale and the
          # pipeline's exit status was tee's, so a bad extraArgs attribute made
          # ns-3 exit instantly and the job still passed with an EMPTY results
          # table (run 29656957470). pipefail propagates the ns-3 exit status;
          # stderr goes to a file (kept out of the results) and its tail is
          # printed so the fatal-error text is visible in the log.
          set -o pipefail
          # #131: wrap in /usr/bin/time -v to measure wall clock + peak RSS of
          # the whole sim process. -o keeps time's report in its own file so
          # the ns-3 stderr handling below stays exactly as before; the compact
          # result step parses it into a ##PERF## line.
          timewrap=""
          if [ -x /usr/bin/time ]; then
            timewrap="/usr/bin/time -v -o $GITHUB_WORKSPACE/time-v.log"
          fi
          $timewrap ./ns3 run "$cmd" 2>"$GITHUB_WORKSPACE/ns3-stderr.log" \
            | tee "$GITHUB_WORKSPACE/paper-results.txt" \
            || { echo "--- ns-3 run FAILED; stderr tail ---"; \
                 tail -n 60 "$GITHUB_WORKSPACE/ns3-stderr.log"; exit 1; }
          if [ -s "$GITHUB_WORKSPACE/ns3-stderr.log" ]; then
            echo "--- ns-3 stderr tail (non-fatal) ---"
            tail -n 20 "$GITHUB_WORKSPACE/ns3-stderr.log"
          fi
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: paper-benchmark
          path: paper-results.txt
          retention-days: 7
      - name: Compact result block (cheap to fetch via get_job_logs tail)
        # Re-emit each protocol row as a single greppable line as the LAST log
        # output, so the benchmark-results skill can read just the numbers with a
        # small tail_lines instead of scraping the whole table+cleanup noise.
        # Empty-table gate (#28): zero rows means the run produced no results
        # (e.g. an instant ns-3 exit) — fail hard instead of passing silently.
        run: |
          awk '$1 ~ /^(anthocnet|aodv|olsr|dsdv)$/ && $2 ~ /^[0-9.]+$/ \
               {print "##BENCH##", $1, $2, $3, $4, $5, $6, $7, $8, $9}' \
            "$GITHUB_WORKSPACE/paper-results.txt" > "$GITHUB_WORKSPACE/bench-rows.txt"
          if ! [ -s "$GITHUB_WORKSPACE/bench-rows.txt" ]; then
            echo "FAIL: no protocol result rows in paper-results.txt — empty results table (#28)."
            exit 1
          fi
          # #128: append the per-run ##RUN## rows (already machine-readable in
          # the compare stdout, so present in paper-results.txt via the tee)
          # after the ##BENCH## means, so paired per-seed statistics are
          # fetchable from the same cheap log tail. `|| true`: absent on older
          # binaries / the baselines harness — means-only block stays valid.
          grep '^##RUN##' "$GITHUB_WORKSPACE/paper-results.txt" \
            >> "$GITHUB_WORKSPACE/bench-rows.txt" || true
          cat "$GITHUB_WORKSPACE/bench-rows.txt"
          # #131: sim cost — one process-wide line (anthocnet-compare runs all
          # protocols in one process, hence proto field "all"):
          #   ##PERF## paper all <wall_s> <maxrss_kb>
          # Elapsed comes as h:mm:ss or m:ss.cc; convert to seconds. Missing
          # time-v.log (no /usr/bin/time in the image) just skips the line.
          if [ -s "$GITHUB_WORKSPACE/time-v.log" ]; then
            awk '/Elapsed \(wall clock\) time/ {
                   n = split($NF, t, ":")
                   wall = (n == 3) ? t[1]*3600 + t[2]*60 + t[3] : t[1]*60 + t[2]
                 }
                 /Maximum resident set size/ { rss = $NF }
                 END { if (wall != "" && rss != "")
                         printf "##PERF## paper all %.1f %d\n", wall, rss }' \
              "$GITHUB_WORKSPACE/time-v.log"
          fi
