name: Benchmarks

# After every merge to the default branch, re-run the scenario taxonomy across
# all baselines (AODV/OLSR/DSDV) and publish the refreshed results back into the
# repo: the per-scenario table in docs/benchmarks.md AND the taxonomy chart in
# docs/benchmarks/. So the published numbers + figures always track the code.
#
# Scope: this runs the *discrete* named scenarios (quick preset). The heavier
# parameter sweeps (area/pause/scale) stay in the manual "Scenario matrix +
# charts" workflow -- too expensive for a per-merge job.
on:
  push:
    branches: [main, master]   # both, so it survives the default-branch rename
  workflow_dispatch:

# Needed to push the regenerated table + charts back to the branch; packages to
# pull the pre-built ns-3 image.
permissions:
  contents: write
  packages: read

# One benchmark at a time; newer pushes supersede older queued runs.
concurrency:
  group: benchmarks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  benchmark:
    runs-on: ubuntu-latest
    # Build against the pre-built plain ns-3 image (same as ci.yml) instead of
    # compiling ns-3 from source, so the job has budget to run the whole
    # taxonomy instead of a single scenario.
    container:
      image: ghcr.io/${{ github.repository_owner }}/ns3:3.42
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Install AntHocNet module
        run: make install-ns3 NS3DIR=/opt/ns-3
      - name: Configure + build
        run: |
          cd /opt/ns-3
          ./ns3 configure --enable-examples \
            --enable-modules='anthocnet;wifi;mobility;applications;csma;aodv;olsr;dsdv;flow-monitor;point-to-point'
          ./ns3 build
      - name: Install matplotlib
        run: apt-get update && apt-get install -y python3-matplotlib
      - name: Run scenario taxonomy (quick)
        run: |
          python3 ns3/tools/run-scenarios.py /opt/ns-3 \
            --out "$GITHUB_WORKSPACE/scenarios.csv" --only discrete --quick
      - name: Render charts
        run: python3 ns3/tools/make-charts.py "$GITHUB_WORKSPACE/scenarios.csv" --outdir docs/benchmarks
      - name: Update results table
        run: python3 ns3/tools/update-benchmarks.py "$GITHUB_WORKSPACE/scenarios.csv" docs/benchmarks.md
      - name: Upload CSV + charts artifact
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            scenarios.csv
            docs/benchmarks/*.png
          retention-days: 7
      - name: Commit refreshed results (if changed)
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/benchmarks.md docs/benchmarks
          if git diff --cached --quiet; then
            echo "Benchmark results unchanged; nothing to commit."
            exit 0
          fi
          git commit -m "docs: refresh benchmark results + charts [skip ci]"
          git push
