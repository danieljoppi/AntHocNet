name: CI

on:
  # Limit push to the default branch so PR branches run once (via the
  # pull_request event) instead of twice (push + pull_request).
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

jobs:
  core:
    name: core library + unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain
        run: sudo apt-get update && sudo apt-get install -y cmake g++
      - name: Build and test core
        run: make test

  core-sanitizers:
    name: core under ASan + UBSan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain
        run: sudo apt-get update && sudo apt-get install -y cmake g++
      - name: Build core with sanitizers and run tests
        run: |
          cmake -S core -B core/build-san -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-sanitize-recover=all -g"
          cmake --build core/build-san -j
          cd core/build-san && ctest --output-on-failure

  ns2-patch:
    name: NS-2 patch round-trip (synthetic tree)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate apply/revert against a synthetic ns-2 tree
        run: bash ns2/patch/selftest.sh

  ns3-build:
    name: NS-3 module build + test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ns3: [ns-3.41, ns-3.42]   # catch API drift across releases
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain
        run: sudo apt-get update && sudo apt-get install -y cmake g++ python3 ninja-build
      - name: Fetch ns-3 (${{ matrix.ns3 }})
        run: |
          git clone --depth 1 --branch ${{ matrix.ns3 }} https://gitlab.com/nsnam/ns-3-dev.git ns-3
      - name: Install AntHocNet module
        run: make install-ns3 NS3DIR="$PWD/ns-3"
      - name: Configure (with comparison protocols)
        run: |
          cd ns-3
          ./ns3 configure --enable-tests --enable-examples \
            --enable-modules='anthocnet;wifi;mobility;applications;aodv;olsr;dsdv;flow-monitor;point-to-point'
      - name: Build
        run: cd ns-3 && ./ns3 build
      - name: Run module test suite (header round-trip + multi-hop delivery)
        run: cd ns-3 && ./test.py -s anthocnet
      - name: Smoke-run the example
        run: cd ns-3 && ./ns3 run anthocnet-example
      - name: Smoke-run the protocol comparison
        run: cd ns-3 && ./ns3 run "anthocnet-compare --nNodes=8 --time=12 --area=150 --flows=2"
