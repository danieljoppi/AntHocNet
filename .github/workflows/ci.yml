name: CI

on:
  # Limit push to the default branch so PR branches run once (via the
  # pull_request event) instead of twice (push + pull_request). Both main and
  # master are listed so this works before/after the default-branch rename.
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

# packages:read lets the container jobs pull the pre-built simulator images
# from GHCR; contents:read is for checkout.
permissions:
  contents: read
  packages: read

jobs:
  core:
    name: core library + unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain
        run: sudo apt-get update && sudo apt-get install -y cmake g++
      - name: Build and test core
        run: make test

  core-sanitizers:
    name: core under ASan + UBSan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain
        run: sudo apt-get update && sudo apt-get install -y cmake g++
      - name: Build core with sanitizers and run tests
        run: |
          cmake -S core -B core/build-san -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-sanitize-recover=all -g"
          cmake --build core/build-san -j
          cd core/build-san && ctest --output-on-failure

  codec-fuzz:
    name: codec fuzz (libFuzzer, 60s)
    runs-on: ubuntu-latest
    # The codec is the only parser of untrusted network bytes (item 12), so fuzz
    # its decode path against a small seed corpus. ubuntu-latest's clang ships
    # the libFuzzer/ASan runtimes; a crash/UB/over-read fails the job.
    steps:
      - uses: actions/checkout@v4
      - name: Build the codec fuzz target (clang + libFuzzer/ASan)
        run: |
          cmake -S core -B core/build-fuzz -DANTHOCNET_FUZZ=ON -DCMAKE_CXX_COMPILER=clang++
          cmake --build core/build-fuzz --target fuzz_codec
      - name: Fuzz the decode path for 60s
        run: |
          core/build-fuzz/tests/fuzz_codec -max_total_time=60 -print_final_stats=1 \
            core/tests/fuzz_corpus

  ns2-patch:
    name: NS-2 patch round-trip (synthetic tree)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate apply/revert against a synthetic ns-2 tree
        run: bash ns2/patch/selftest.sh

  ns2-compile:
    name: NS-2 adapter compile + e2e (real ns-2 tree)
    runs-on: ubuntu-latest
    # Compile the ns-2 adapter against a *real* ns-2 tree using the pre-built
    # plain ns-2 image (published to GHCR on merge to the default branch), then
    # run a small static AntHocNet simulation and assert it delivers data. This
    # is the only place the ns-2 agent is actually compiled *and exercised* — the
    # ns2-patch job above only checks that the patch applies/reverts on a
    # synthetic tree.
    #
    # We can't run this as a `container:` job: the ns-2 image is Ubuntu 18.04
    # (glibc 2.27) and the runner injects Node 24 (needs glibc 2.28+) to run
    # actions/checkout, which then fails. So check out on the host and run the
    # build via `docker run` inside the image (native bash, no Node needed).
    strategy:
      fail-fast: false
      matrix:
        version: ['2.34', '2.35']
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compile the adapter and run the e2e delivery smoke
        run: |
          docker run --rm -v "$PWD:/src" -w /src \
            ghcr.io/${{ github.repository_owner }}/ns2:${{ matrix.version }} \
            bash -euxc '
              make install-ns2 NS2DIR="$NS2DIR"
              cd "$NS2DIR"
              ./config.status
              make
              test -x ./ns
              # End-to-end: a static 3-node AntHocNet run must deliver CBR over
              # a forced 2-hop route (loose "routes data" gate, not performance).
              cp /src/ns2/tcl/ci-smoke.tcl .
              ./ns ci-smoke.tcl
              rx=$(grep -c "^r.*AGT.*cbr" ci-smoke.tr || true)
              echo "delivered CBR packets (rx at agent): $rx"
              [ "${rx:-0}" -gt 0 ]
            '
      - name: Re-run the e2e smoke under valgrind (memcheck)
        # Second pass of ci-smoke.tcl under valgrind to catch adapter-class
        # memory errors (the original NS-2 module's headline bugs). Only on
        # ns-2.35 to bound cost — valgrind slows the run ~20-50x and one tree
        # version is enough for calibration. A fresh `docker run` is needed
        # (the previous step's container is gone), but the image ships the
        # stock tree pre-built, so this only recompiles the adapter + relinks.
        # The image is Ubuntu 18.04, so valgrind comes from apt; the checkout
        # is mounted at /src, hence the /src/... suppressions path. Note
        # --leak-check=summary keeps leak *errors* off while calibrating
        # (only memcheck errors like invalid reads/writes fail the run);
        # tighten to --leak-check=full alongside promotion. Non-blocking —
        # promote to blocking once green on main (#130).
        if: matrix.version == '2.35'
        continue-on-error: true
        run: |
          docker run --rm -v "$PWD:/src" -w /src \
            ghcr.io/${{ github.repository_owner }}/ns2:${{ matrix.version }} \
            bash -euxc '
              apt-get update && apt-get install -y --no-install-recommends valgrind
              make install-ns2 NS2DIR="$NS2DIR"
              cd "$NS2DIR"
              ./config.status
              make
              test -x ./ns
              cp /src/ns2/tcl/ci-smoke.tcl .
              valgrind --error-exitcode=1 --errors-for-leak-kinds=definite \
                --leak-check=summary \
                --suppressions=/src/ns2/tools/valgrind.supp \
                ./ns ci-smoke.tcl
              rx=$(grep -c "^r.*AGT.*cbr" ci-smoke.tr || true)
              echo "delivered CBR packets under valgrind (rx at agent): $rx"
              [ "${rx:-0}" -gt 0 ]
            '

  ns3-build:
    name: NS-3 module build + test
    runs-on: ubuntu-latest
    # Build against the pre-built plain ns-3 image (published to GHCR on merge
    # to the default branch) rather than compiling ns-3 from scratch: the stock
    # tree is already built, so CI only compiles the AntHocNet module delta
    # (minutes instead of ~13 min/version). The image's gcc spans the whole
    # matrix (it builds 3.36..3.48 cleanly), so no per-version toolchain pin.
    #
    # Note: the images only (re)publish on merge to the default branch, so a
    # newly added ns-3 version must be added to images.yml and merged first.
    container:
      image: ghcr.io/${{ github.repository_owner }}/ns3:${{ matrix.version }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        # 3.36 = CMake-build baseline (widely used in published research);
        # 3.41/3.42 = prior pins; 3.47/3.48 = current releases. Spread catches
        # API drift across the whole supported range.
        version: ['3.36', '3.41', '3.42', '3.47', '3.48']
    steps:
      - uses: actions/checkout@v4
      - name: Install AntHocNet module
        run: make install-ns3 NS3DIR=/opt/ns-3
      - name: Configure (scope examples/tests to AntHocNet)
        run: |
          cd /opt/ns-3
          # Build only AntHocNet's own examples/tests, not the stock modules'
          # (their cross-module deps drift by release). The filter flag scopes
          # that to our module; it was added after ns-3.36, so older trees just
          # build + smoke.
          mods='anthocnet;wifi;mobility;applications;csma;aodv;olsr;dsdv;flow-monitor;point-to-point'
          if ./ns3 configure --help 2>/dev/null | grep -q filter-module-examples-and-tests; then
            ./ns3 configure --enable-tests --enable-examples \
              --filter-module-examples-and-tests=anthocnet \
              --enable-modules="$mods"
            echo "RUN_TESTS=1" >> "$GITHUB_ENV"
          else
            ./ns3 configure --enable-examples --enable-modules="$mods"
            echo "RUN_TESTS=0" >> "$GITHUB_ENV"
          fi
      - name: Build
        run: cd /opt/ns-3 && ./ns3 build
      - name: Run module test suite (header round-trip + multi-hop delivery)
        if: env.RUN_TESTS == '1'
        run: cd /opt/ns-3 && ./test.py -s anthocnet
      - name: Smoke-run the example
        run: cd /opt/ns-3 && ./ns3 run anthocnet-example
      - name: E2E delivery smoke (AntHocNet must deliver in a connected scenario)
        # Loose behavioural gate: in a small, dense, connected scenario AntHocNet
        # must deliver *something* (catches "routes nothing" regressions, not
        # performance noise — that lives in the manual benchmarks). Parse the
        # AntHocNet PDR from the --csv output and require it to be > 0.
        run: |
          cd /opt/ns-3
          out=$(./ns3 run "anthocnet-compare --csv --protocols=anthocnet --nNodes=8 --time=20 --area=150 --flows=2" 2>/dev/null)
          echo "$out"
          pdr=$(printf '%s\n' "$out" | awk -F, '$1=="anthocnet"{print $7}')
          echo "AntHocNet PDR% = ${pdr:-<none>}"
          awk -v p="${pdr:-0}" 'BEGIN { exit (p+0 > 0) ? 0 : 1 }' \
            || { echo "FAIL: AntHocNet delivered no packets (PDR=${pdr:-<none>})"; exit 1; }
      - name: Validation-anchor gate (single-hop PDR floor, #59)
        # Blocking anchor from docs/benchmarks.md "Validation anchors": on a
        # static, in-range 2-node link the *stock* stack (manet-baselines, no
        # AntHocNet code) must deliver ~100% — a #51-style channel/rate-manager
        # regression reads ~50% and used to go completely undetected. Runs on
        # one matrix version to keep CI cheap (this reuses the job's build);
        # the heavier Broch-field anchor runs per-merge in benchmarks.yml.
        # Thresholds: ns3/tools/anchors.yml.
        if: matrix.version == '3.42'
        run: bash ns3/tools/check-anchors.sh /opt/ns-3 single-hop

  ns3-asan:
    name: NS-3 module under ASan + LSan
    runs-on: ubuntu-latest
    # Sanitize the adapter surface (pending-packet queue, timer cancel paths,
    # header <-> AntMessage conversion): rebuild the AntHocNet module and its
    # ns-3 dependencies with AddressSanitizer + LeakSanitizer, then re-run the
    # same module test suite and e2e delivery smoke as ns3-build. Single matrix
    # version (3.42, the anchor-gate pin) to bound cost. Non-blocking while the
    # LSan suppression file (ns3/tools/lsan.supp) is calibrated against
    # upstream ns-3 static/global allocations — promote to blocking once green
    # on main (#130).
    continue-on-error: true
    container:
      image: ghcr.io/${{ github.repository_owner }}/ns3:3.42
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      # LeakSanitizer attaches to the process via ptrace at exit. The default
      # docker seccomp profile allows ptrace on current runners, but be
      # explicit so LSan can't start failing with "ptrace failed" after a
      # runner/docker update.
      options: --cap-add=SYS_PTRACE
    steps:
      - uses: actions/checkout@v4
      - name: Install AntHocNet module
        run: make install-ns3 NS3DIR=/opt/ns-3
      - name: Configure with ASan/LSan
        run: |
          cd /opt/ns-3
          # Scope LSan failures to AntHocNet code: suppress known upstream ns-3
          # static-initializer allocations (see the file header for how to
          # extend it). $GITHUB_WORKSPACE is the in-container checkout path.
          echo "LSAN_OPTIONS=suppressions=$GITHUB_WORKSPACE/ns3/tools/lsan.supp" >> "$GITHUB_ENV"
          mods='anthocnet;wifi;mobility;applications;csma;aodv;olsr;dsdv;flow-monitor;point-to-point'
          # ns-3's CMake build has first-class sanitizer support (NS3_SANITIZE),
          # exposed by the ./ns3 wrapper as --enable-sanitizers
          # (address + leak + undefined). Prefer it when the wrapper advertises
          # it — it is re-applied on every configure, so it works on the image's
          # already-configured tree. Fallback: inject the flags via
          # CXXFLAGS/LDFLAGS, which ns-3's CMake only reads on a *fresh*
          # configure, hence the ./ns3 clean first (the flag change forces a
          # full rebuild either way). 3.42 has --filter-module-examples-and-tests
          # (added after 3.36), so tests always run here.
          if ./ns3 configure --help 2>/dev/null | grep -q enable-sanitizers; then
            ./ns3 configure --enable-sanitizers --enable-tests --enable-examples \
              --filter-module-examples-and-tests=anthocnet \
              --enable-modules="$mods"
          else
            ./ns3 clean
            CXXFLAGS='-fsanitize=address -fno-omit-frame-pointer -g' \
            LDFLAGS='-fsanitize=address' \
            ./ns3 configure --enable-tests --enable-examples \
              --filter-module-examples-and-tests=anthocnet \
              --enable-modules="$mods"
          fi
      - name: Build
        run: cd /opt/ns-3 && ./ns3 build
      - name: Run module test suite under ASan/LSan
        run: cd /opt/ns-3 && ./test.py -s anthocnet
      - name: E2E delivery smoke under ASan/LSan
        # Same loose "routes data" gate as ns3-build, but without ns3-build's
        # `2>/dev/null` so sanitizer reports land in the job log (command
        # substitution only captures stdout, so the CSV parse is unaffected).
        run: |
          cd /opt/ns-3
          out=$(./ns3 run "anthocnet-compare --csv --protocols=anthocnet --nNodes=8 --time=20 --area=150 --flows=2")
          echo "$out"
          pdr=$(printf '%s\n' "$out" | awk -F, '$1=="anthocnet"{print $7}')
          echo "AntHocNet PDR% = ${pdr:-<none>}"
          awk -v p="${pdr:-0}" 'BEGIN { exit (p+0 > 0) ? 0 : 1 }' \
            || { echo "FAIL: AntHocNet delivered no packets (PDR=${pdr:-<none>})"; exit 1; }
